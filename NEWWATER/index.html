						case 'KeyA':

				//

				sun = new THREE.Vector3();

				// Water

				const waterGeometry = new THREE.PlaneGeometry( 10000, 10000 );

				water = new Water(
					waterGeometry,
					{
						textureWidth: 512,
						textureHeight: 512,
						waterNormals: new THREE.TextureLoader().load( './src/waternormals.jpg', function ( texture ) {

							texture.wrapS = texture.wrapT = THREE.RepeatWrapping;

						} ),
						sunDirection: new THREE.Vector3(),
						sunColor: 0xffffff,
						waterColor: 0x001e0f,
						distortionScale: 3.7,
						fog: scene.fog !== undefined
					}
				);

				water.rotation.x = - Math.PI / 2;

				scene.add( water );

				// Skybox

				sky = new Sky();
				sky.scale.setScalar( 10000 );
				scene.add( sky );

				const skyUniforms = sky.material.uniforms;

				skyUniforms[ 'turbidity' ].value = 10;
				skyUniforms[ 'rayleigh' ].value = 2;
				skyUniforms[ 'mieCoefficient' ].value = 0.005;
				skyUniforms[ 'mieDirectionalG' ].value = 0.8;
				skyUniforms[ 'cloudCoverage' ].value = 0.4;
				skyUniforms[ 'cloudDensity' ].value = 0.5;
				skyUniforms[ 'cloudElevation' ].value = 0.5;

				const parameters = {
					elevation: 2,
					azimuth: 180,
					exposure: 0.1
				};

				const pmremGenerator = new THREE.PMREMGenerator( renderer );
				const sceneEnv = new THREE.Scene();

				let renderTarget;

				function updateSun() {

					const phi = THREE.MathUtils.degToRad( 90 - parameters.elevation );
					const theta = THREE.MathUtils.degToRad( parameters.azimuth );

					sun.setFromSphericalCoords( 1, phi, theta );

					sky.material.uniforms[ 'sunPosition' ].value.copy( sun );
					water.material.uniforms[ 'sunDirection' ].value.copy( sun ).normalize();

					if ( renderTarget !== undefined ) renderTarget.dispose();

					sceneEnv.add( sky );
					renderTarget = pmremGenerator.fromScene( sceneEnv );
					scene.add( sky );

					scene.environment = renderTarget.texture;

				}

				updateSun();

				//

//				const geometry = new THREE.BoxGeometry( 30, 30, 30 );
//				const material = new THREE.MeshStandardMaterial( { roughness: 0 } );

//				mesh = new THREE.Mesh( geometry, material );

				// GUI

//				const gui = new GUI();

				const folderSky = gui.addFolder( 'Sky' );
				folderSky.add( parameters, 'elevation', 0, 90, 0.1 ).onChange( updateSun );
				folderSky.add( parameters, 'azimuth', - 180, 180, 0.1 ).onChange( updateSun );
				folderSky.add( parameters, 'exposure', 0, 1, 0.0001 ).onChange( function ( value ) {

					renderer.toneMappingExposure = value;

				} );
				folderSky.open();

				const waterUniforms = water.material.uniforms;

				const folderWater = gui.addFolder( 'Water' );
				folderWater.add( waterUniforms.distortionScale, 'value', 0, 8, 0.1 ).name( 'distortionScale' );
				folderWater.add( waterUniforms.size, 'value', 0.1, 10, 0.1 ).name( 'size' );
				folderWater.open();

				const folderBloom = gui.addFolder( 'Bloom' );
				folderBloom.add( bloomPass, 'strength', 0, 3, 0.01 );
				folderBloom.add( bloomPass, 'radius', 0, 1, 0.01 );
				folderBloom.open();

				const folderClouds = gui.addFolder( 'Clouds' );
				folderClouds.add( skyUniforms.cloudCoverage, 'value', 0, 1, 0.01 ).name( 'coverage' );
				folderClouds.add( skyUniforms.cloudDensity, 'value', 0, 1, 0.01 ).name( 'density' );
				folderClouds.add( skyUniforms.cloudElevation, 'value', 0, 1, 0.01 ).name( 'elevation' );
				folderClouds.open();

				window.addEventListener( 'resize', onWindowResize );

			function onWindowResize() {

				camera.aspect = window.innerWidth / window.innerHeight;
				camera.updateProjectionMatrix();

				renderer.setSize( window.innerWidth, window.innerHeight );
				///afterimage
composer.setSize(window.innerWidth, window.innerHeight);
			}

			function animate() {
				    const time2 = performance.now();
									const delta = ( time2 - prevTime ) / 1000;
				if ( controlsfps.isLocked === true ) {

					

					velocity.x -= velocity.x * 10.0 * delta;
					velocity.z -= velocity.z * 10.0 * delta;

					velocity.y -= 9.8 * 100.0 * delta;

					direction.z = Number( moveForward ) - Number( moveBackward );
					direction.x = Number( moveRight ) - Number( moveLeft );
					direction.normalize(); 

					if ( moveForward || moveBackward ) velocity.z -= direction.z * 400.0 * delta;
					if ( moveLeft || moveRight ) velocity.x -= direction.x * 400.0 * delta;

					controlsfps.moveRight( - velocity.x * delta );
					controlsfps.moveForward( - velocity.z * delta );
				

						canJump = true;
}
				prevTime = time2;
				render();
//				stats.update();

			}
			
			
			function render() {

				const time = performance.now() * 0.001;

//				mesh.position.y = Math.sin( time ) * 20 + 5;
	//			mesh.rotation.x = time * 0.5;
		//		mesh.rotation.z = time * 0.51;

				water.material.uniforms[ 'time' ].value += 1.0 / 60.0;
				sky.material.uniforms[ 'time' ].value = time;

composer.render();

			}
